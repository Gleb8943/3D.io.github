<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Модель Spline с OrbitControls</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Панель управления */
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-size: 13px;
            display: flex;
            gap: 20px;
            pointer-events: auto;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .controls-panel button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 500;
        }
        
        .controls-panel button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.02);
        }
        
        .controls-panel label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        input[type="range"] {
            width: 100px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 3px;
        }
        
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #6c5ce7;
        }
        
        .instruction {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            pointer-events: none;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 16px 28px;
            border-radius: 40px;
            z-index: 200;
            font-size: 14px;
            font-family: monospace;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            white-space: nowrap;
        }
        
        @media (max-width: 700px) {
            .controls-panel { padding: 8px 15px; gap: 12px; font-size: 10px; bottom: 10px; left: 10px; }
            .controls-panel button { padding: 4px 10px; font-size: 10px; }
            .instruction { font-size: 9px; bottom: 10px; right: 10px; }
            .loader { font-size: 12px; padding: 12px 20px; white-space: nowrap; }
            input[type="range"] { width: 70px; }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <span>🌀 ЗАГРУЗКА 3D МОДЕЛИ...</span>
    </div>
    
    <div class="controls-panel">
        <label>
            🔄 АВТОВРАЩЕНИЕ
            <input type="checkbox" id="autoRotateToggle" checked>
        </label>
        <label>
            ⚡ СКОРОСТЬ
            <input type="range" id="rotationSpeed" min="0" max="0.015" step="0.0005" value="0.005">
        </label>
        <button id="resetCameraBtn">🎥 СБРОС КАМЕРЫ</button>
    </div>
    <div class="instruction">
        🖱️ МЫШЬ: ВРАЩЕНИЕ | ПКМ: ПАНОРАМА | SCROLL: ЗУМ
    </div>

    <!-- ОДИН КАНВАС ДЛЯ ВСЕГО -->
    <canvas id="splineCanvas" style="display: block; width: 100%; height: 100%; position: fixed; top: 0; left: 0;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Application } from '@splinetool/runtime';
        
        // !!! ВАЖНО: ЗАМЕНИТЕ НА ВАШУ РЕАЛЬНУЮ ССЫЛКУ ИЗ SPLINE !!!
        // Как получить ссылку: в Spline нажмите Export → Code → Vanilla JS → скопируйте URL
        const SPLINE_URL = 'https://prod.spline.design/H3IPKughh5kpqf3u/scene.splinecode';
        
        // --- ИНИЦИАЛИЗАЦИЯ ---
        const canvas = document.getElementById('splineCanvas');
        const loaderDiv = document.getElementById('loader');
        
        // 1. СОЗДАЕМ СЦЕНУ THREE.JS
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // Тёмно-синий фон (можно поменять)
        
        // 2. СОЗДАЕМ КАМЕРУ
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);
        
        // 3. СОЗДАЕМ РЕНДЕРЕР
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // 4. ORBIT CONTROLS (УПРАВЛЕНИЕ КАМЕРОЙ)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // Плавность
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 1, 0);
        
        // 5. НЕБОЛЬШОЕ ОСВЕЩЕНИЕ (если модель тёмная, поможет)
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(2, 5, 3);
        scene.add(directionalLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(-2, 1, -3);
        scene.add(fillLight);
        
        // 6. ВСПОМОГАТЕЛЬНЫЙ ОБЪЕКТ ДЛЯ ВИЗУАЛИЗАЦИИ ВРАЩЕНИЯ
        //    (если модель не грузится, будет видно, что сцена работает)
        const helperGeometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const helperMaterial = new THREE.MeshStandardMaterial({ color: 0xff6600, wireframe: true });
        const helperBox = new THREE.Mesh(helperGeometry, helperMaterial);
        helperBox.position.set(0, 1, 0);
        scene.add(helperBox);
        
        // Сетка для ориентации в пространстве
        const gridHelper = new THREE.GridHelper(15, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        // Оси координат (красный X, зелёный Z)
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);
        
        // 7. ПЕРЕМЕННЫЕ ДЛЯ АНИМАЦИИ
        let splineGroup = null;      // Группа с загруженной моделью
        let autoRotate = true;
        let rotationSpeed = 0.005;
        let currentRotationY = 0;
        
        // 8. ЗАГРУЗКА МОДЕЛИ ЧЕРЕЗ Spline Runtime
        const splineApp = new Application(canvas);
        
        console.log('🚀 Начинаем загрузку модели:', SPLINE_URL);
        
        splineApp.load(SPLINE_URL)
            .then(() => {
                console.log('✅ Модель успешно загружена через Spline Runtime!');
                
                // Скрываем лоадер
                if (loaderDiv) loaderDiv.style.display = 'none';
                
                // Убираем вспомогательные объекты (они были нужны для проверки)
                scene.remove(helperBox);
                scene.remove(gridHelper);
                // axesHelper оставляем для ориентации (можно удалить позже)
                
                // Получаем сцену из Spline
                const splineScene = splineApp.scene;
                
                if (splineScene) {
                    // Настраиваем фон (если нужно прозрачным)
                    // scene.background = null; // Раскомментировать если нужен прозрачный фон
                    
                    // Обработка ошибок материалов (если есть проблемы с текстурой)
                    console.log('📦 Сцена Spline содержит объектов:', splineScene.children?.length || 0);
                    
                    // Корректируем позицию модели если нужно
                    if (splineScene.position) {
                        // Можно подстроить положение модели
                    }
                }
                
                // Пытаемся найти объекты для вращения
                const allObjects = splineApp.getAllObjects ? splineApp.getAllObjects() : [];
                console.log('🎨 Найдено объектов в сцене:', allObjects.length);
                
                // Если объекты не находятся, будем вращать всю сцену
            })
            .catch((error) => {
                console.error('❌ ОШИБКА ЗАГРУЗКИ МОДЕЛИ:', error);
                if (loaderDiv) {
                    loaderDiv.innerHTML = '❌ ОШИБКА: Модель не загружена<br>Проверьте ссылку .splinecode';
                    loaderDiv.style.background = 'rgba(200,0,0,0.9)';
                    setTimeout(() => {
                        if (loaderDiv) loaderDiv.style.opacity = '0.7';
                    }, 3000);
                }
            });
        
        // 9. ФУНКЦИЯ ВРАЩЕНИЯ МОДЕЛИ/СЦЕНЫ
        function rotateSplineScene(angle) {
            if (!splineApp || !splineApp.scene) return;
            
            // Способ 1: Вращаем всю сцену Spline
            if (splineApp.scene.rotation !== undefined) {
                splineApp.scene.rotation.y = angle;
            }
            
            // Способ 2: Находим группу и вращаем её
            try {
                const allObjects = splineApp.getAllObjects ? splineApp.getAllObjects() : [];
                allObjects.forEach(obj => {
                    // Если объект имеет имя и должен вращаться
                    if (obj && obj.rotation) {
                        // Вращаем все объекты, кроме камеры
                        if (obj.type !== 'camera' && obj.name !== 'Camera') {
                            obj.rotation.y = angle;
                        }
                    }
                });
            } catch(e) {
                // Игнорируем ошибки при поиске объектов
            }
        }
        
        // 10. АНИМАЦИОННЫЙ ЦИКЛ
        function animate() {
            requestAnimationFrame(animate);
            
            // Автоматическое вращение модели
            if (autoRotate && splineApp && splineApp.scene) {
                currentRotationY += rotationSpeed;
                rotateSplineScene(currentRotationY);
            }
            
            // Обновляем OrbitControls
            controls.update();
            
            // Рендерим сцену
            renderer.render(scene, camera);
        }
        
        animate();
        
        // 11. НАСТРОЙКА UI
        const autoRotateToggle = document.getElementById('autoRotateToggle');
        const rotationSpeedSlider = document.getElementById('rotationSpeed');
        const resetCameraBtn = document.getElementById('resetCameraBtn');
        
        if (autoRotateToggle) {
            autoRotateToggle.addEventListener('change', (e) => {
                autoRotate = e.target.checked;
            });
        }
        
        if (rotationSpeedSlider) {
            rotationSpeedSlider.addEventListener('input', (e) => {
                rotationSpeed = parseFloat(e.target.value);
            });
        }
        
        if (resetCameraBtn) {
            resetCameraBtn.addEventListener('click', () => {
                camera.position.set(5, 4, 8);
                controls.target.set(0, 1, 0);
                controls.update();
                
                // Сброс вращения сцены
                currentRotationY = 0;
                rotateSplineScene(0);
            });
        }
        
        // 12. АДАПТАЦИЯ ПОД ИЗМЕНЕНИЕ РАЗМЕРА ОКНА
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            if (splineApp && splineApp.setSize) {
                splineApp.setSize(window.innerWidth, window.innerHeight);
            }
        });
        
        // Для отладки: выводим статус в консоль
        console.log('🎮 3D сцена инициализирована');
        console.log('📌 Если модель не видна, проверьте:');
        console.log('   1. Ссылка должна быть .splinecode (не .spline)');
        console.log('   2. В консоли нет ошибок CORS');
        console.log('   3. Модель опубликована (не в черновике)');
    </script>
</body>
</html>
