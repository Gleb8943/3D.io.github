<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Модель Spline с управлением и вращением</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        canvas {
            display: block;
            vertical-align: bottom;
        }
        
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10;
            font-size: 14px;
            pointer-events: none;
        }
        
        /* Панель управления */
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            display: flex;
            gap: 20px;
            pointer-events: auto;
            font-family: monospace;
        }
        
        .controls-panel button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }
        
        .controls-panel button:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .controls-panel label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        input[type="range"] {
            width: 100px;
            cursor: pointer;
        }
        
        .instruction {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
    
    <!-- Подключаем Three.js и расширения -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div class="loader">Загрузка 3D модели...</div>
    
    <div class="controls-panel">
        <label>
            🔄 Автовращение объектов
            <input type="checkbox" id="autoRotateToggle" checked>
        </label>
        <label>
            ⚡ Скорость вращения
            <input type="range" id="rotationSpeed" min="0" max="0.02" step="0.001" value="0.005">
        </label>
        <button id="resetCameraBtn">🎥 Сбросить камеру</button>
    </div>
    <div class="instruction">
        🖱️ Мышь: вращение | ПКМ: панорама | Scroll: зум
    </div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.18/build/runtime.js';
        
        // !!! ВАЖНО: Замените ЭТУ ССЫЛКУ на вашу реальную ссылку из Spline !!!
        const splineUrl = 'https://prod.spline.design/H3IPKughh5kpqf3u/scene.splinecode';
        
        // --- НАСТРОЙКА СЦЕНЫ THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // Черный фон (можно заменить)
        
        // Настройка камеры
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);
        
        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // --- ORBIT CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // Плавность движения
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // --- ПЕРЕМЕННЫЕ ДЛЯ АНИМАЦИИ ---
        let splineGroup = null;          // Группа со всеми объектами из Spline
        let autoRotate = true;
        let rotationSpeed = 0.005;
        
        // --- ЗАГРУЗКА МОДЕЛИ ИЗ SPLINE ---
        // Создаем отдельный канвас для Spline (невидимый, используем только для получения объектов)
        const splineCanvas = document.createElement('canvas');
        splineCanvas.style.position = 'fixed';
        splineCanvas.style.top = '-9999px';
        splineCanvas.style.left = '-9999px';
        splineCanvas.style.width = '1px';
        splineCanvas.style.height = '1px';
        document.body.appendChild(splineCanvas);
        
        const splineApp = new Application(splineCanvas);
        
        // Загружаем сцену Spline
        splineApp.load(splineUrl)
            .then(() => {
                console.log('Spline модель загружена');
                
                // Получаем сцену Spline и копируем объекты в Three.js
                const splineScene = splineApp.scene;
                if (splineScene && splineScene.children) {
                    splineGroup = new THREE.Group();
                    
                    // Функция для копирования объектов из Spline в Three
                    function copyObjects(source, target) {
                        source.children.forEach(child => {
                            if (child.type === 'Mesh') {
                                // Копируем геометрию и материал
                                const geometry = child.geometry;
                                const material = child.material;
                                
                                if (geometry && material) {
                                    const mesh = new THREE.Mesh(geometry, material);
                                    mesh.position.copy(child.position);
                                    mesh.rotation.copy(child.rotation);
                                    mesh.scale.copy(child.scale);
                                    mesh.userData = { originalRotation: child.rotation.clone() };
                                    target.add(mesh);
                                }
                            } else if (child.children) {
                                // Рекурсивно обрабатываем вложенные объекты
                                const subGroup = new THREE.Group();
                                copyObjects(child, subGroup);
                                subGroup.position.copy(child.position);
                                subGroup.rotation.copy(child.rotation);
                                subGroup.scale.copy(child.scale);
                                target.add(subGroup);
                            }
                        });
                    }
                    
                    copyObjects(splineScene, splineGroup);
                    scene.add(splineGroup);
                    
                    console.log('Объекты импортированы в Three.js');
                }
                
                // Скрываем лоадер
                const loader = document.querySelector('.loader');
                if (loader) loader.style.display = 'none';
                
                // Удаляем временный канвас
                document.body.removeChild(splineCanvas);
            })
            .catch((error) => {
                console.error('Ошибка загрузки Spline:', error);
                const loader = document.querySelector('.loader');
                if (loader) {
                    loader.textContent = 'Ошибка загрузки 3D. Проверьте ссылку.';
                    loader.style.background = 'red';
                }
            });
        
        // --- НАСТРОЙКА UI ---
        const autoRotateToggle = document.getElementById('autoRotateToggle');
        const rotationSpeedSlider = document.getElementById('rotationSpeed');
        const resetCameraBtn = document.getElementById('resetCameraBtn');
        
        autoRotateToggle.addEventListener('change', (e) => {
            autoRotate = e.target.checked;
        });
        
        rotationSpeedSlider.addEventListener('input', (e) => {
            rotationSpeed = parseFloat(e.target.value);
        });
        
        resetCameraBtn.addEventListener('click', () => {
            camera.position.set(5, 5, 10);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        // --- ВРАЩЕНИЕ ОБЪЕКТОВ ВОКРУГ СВОЕЙ ОСИ ---
        function rotateObjects(group, speed) {
            if (!group || !autoRotate) return;
            
            group.children.forEach(child => {
                if (child.isMesh) {
                    // Вращаем каждый меш вокруг своей оси Y
                    child.rotation.y += speed;
                } else if (child.isGroup) {
                    // Рекурсивно вращаем дочерние группы
                    rotateObjects(child, speed);
                }
            });
        }
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Вращаем все объекты
            if (splineGroup) {
                rotateObjects(splineGroup, rotationSpeed);
            }
            
            // Обновляем OrbitControls
            controls.update();
            
            // Рендерим сцену Three.js
            renderer.render(scene, camera);
        }
        
        animate();
        
        // --- АДАПТАЦИЯ ПОД ИЗМЕНЕНИЕ РАЗМЕРА ОКНА ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Добавляем небольшое освещение для лучшей видимости (если модель темная)
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
        backLight.position.set(-1, 1, -1);
        scene.add(backLight);
        
        console.log('Сцена готова, ожидаем загрузку модели...');
    </script>
</body>
</html>
