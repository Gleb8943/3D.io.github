<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Модель Spline</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Убираем прокрутку, чтобы модель занимала весь блок */
            font-family: sans-serif;
        }
        
        /* Важно: делаем канвас во весь экран */
        canvas {
            display: block;
            vertical-align: bottom;
        }
        
        /* Небольшой лоадер на случай долгой загрузки */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    
    <!-- Подключаем раннер Spline (официальный способ загрузки) -->
    <script type="module" src="https://unpkg.com/@splinetool/runtime@1.9.18/build/runtime.js"></script>
</head>
<body>
    <div class="loader">Загрузка 3D...</div>
    
    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.18/build/runtime.js';
        
        // !!! ВАЖНО: Замените ЭТУ ССЫЛКУ на вашу реальную ссылку из Spline !!!
        // Должно быть что-то вроде: https://prod.spline.design/ВАШ_АЙДИ/scene.splinecode
        const splineUrl = 'ССЫЛКА_ИЗ_SPLINE';
        
        // Находим контейнер (body) или создаем канвас
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.display = 'block';
        document.body.appendChild(canvas);
        
        // Скрываем лоадер, когда модель загрузится
        const loader = document.querySelector('.loader');
        
        // Запускаем приложение Spline
        const app = new Application(canvas);
        app.load(splineUrl)
            .then(() => {
                console.log('3D модель успешно загружена');
                if (loader) loader.style.display = 'none';
            })
            .catch((error) => {
                console.error('Ошибка загрузки:', error);
                if (loader) {
                    loader.textContent = 'Ошибка загрузки 3D. Проверьте ссылку.';
                    loader.style.background = 'red';
                }
            });
            
        // Адаптация под изменение размера окна (опционально)
        window.addEventListener('resize', () => {
            // @ts-ignore
            if (app && app.resize) app.resize();
        });
    </script>
</body>
</html>
