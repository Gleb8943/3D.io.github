<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Модель Spline с управлением и вращением</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        canvas {
            display: block;
            vertical-align: bottom;
        }
        
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 20;
            font-size: 14px;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(10px);
        }
        
        /* Панель управления */
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 13px;
            display: flex;
            gap: 20px;
            pointer-events: auto;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .controls-panel button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }
        
        .controls-panel button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.02);
        }
        
        .controls-panel label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        input[type="range"] {
            width: 100px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        
        .instruction {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            pointer-events: none;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* Стиль для канваса Spline */
        #splineCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="loader">🔄 Загрузка 3D модели...</div>
    
    <div class="controls-panel">
        <label>
            🔄 Автовращение
            <input type="checkbox" id="autoRotateToggle" checked>
        </label>
        <label>
            ⚡ Скорость
            <input type="range" id="rotationSpeed" min="0" max="0.02" step="0.001" value="0.005">
        </label>
        <button id="resetCameraBtn">🎥 Сбросить камеру</button>
    </div>
    <div class="instruction">
        🖱️ Мышь: вращение | ПКМ: панорама | Scroll: зум
    </div>
    
    <!-- Канвас для Spline -->
    <canvas id="splineCanvas"></canvas>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.18/build/runtime.js';
        
        // !!! ВАЖНО: Замените ЭТУ ССЫЛКУ на вашу реальную ссылку из Spline !!!
        const splineUrl = 'https://prod.spline.design/H3IPKughh5kpqf3u/scene.splinecode';
        
        // --- НАСТРОЙКА THREE.JS СЦЕНЫ ДЛЯ ORBIT CONTROLS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // Черный фон
        
        // Камера Three.js
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);
        
        // Рендерер Three.js (прозрачный, чтобы видеть Spline снизу)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); // Прозрачный фон
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Ставим Three.js канвас поверх Spline
        renderer.domElement.style.position = 'fixed';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.width = '100%';
        renderer.domElement.style.height = '100%';
        renderer.domElement.style.zIndex = '2';
        renderer.domElement.style.pointerEvents = 'auto';
        
        // Канвас Spline будет под ним
        const splineCanvas = document.getElementById('splineCanvas');
        splineCanvas.style.position = 'fixed';
        splineCanvas.style.top = '0';
        splineCanvas.style.left = '0';
        splineCanvas.style.width = '100%';
        splineCanvas.style.height = '100%';
        splineCanvas.style.zIndex = '1';
        
        // --- ORBIT CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // --- ЗАГРУЗКА МОДЕЛИ В SPLINE ---
        let splineApp = null;
        let autoRotate = true;
        let rotationSpeed = 0.005;
        let currentRotation = 0;
        
        // Функция для синхронизации камеры Spline с Three.js
        function syncSplineCamera() {
            if (!splineApp || !splineApp.camera) return;
            
            // Получаем позицию камеры из Three.js
            const pos = camera.position;
            const target = controls.target;
            
            // Вычисляем направление
            const direction = new THREE.Vector3().subVectors(target, pos).normalize();
            
            // Обновляем камеру Spline (если у нее есть такой метод)
            if (splineApp.camera.position) {
                splineApp.camera.position.x = pos.x;
                splineApp.camera.position.y = pos.y;
                splineApp.camera.position.z = pos.z;
            }
        }
        
        // Запускаем приложение Spline
        splineApp = new Application(splineCanvas);
        splineApp.load(splineUrl)
            .then(() => {
                console.log('✅ Spline модель успешно загружена');
                
                // Скрываем лоадер
                const loader = document.querySelector('.loader');
                if (loader) loader.style.display = 'none';
                
                // Настраиваем фон Spline (делаем прозрачным, чтобы видеть сцену Three.js)
                if (splineApp.scene && splineApp.scene.background) {
                    splineApp.scene.background = null; // Прозрачный фон
                }
            })
            .catch((error) => {
                console.error('❌ Ошибка загрузки Spline:', error);
                const loader = document.querySelector('.loader');
                if (loader) {
                    loader.textContent = '❌ Ошибка загрузки 3D. Проверьте ссылку.';
                    loader.style.background = 'rgba(255,0,0,0.8)';
                }
            });
        
        // --- ПОВОРОТ ГРУППЫ ОБЪЕКТОВ В SPLINE ---
        // Spline позволяет вращать всю сцену или отдельные объекты через API
        function rotateSplineScene(angle) {
            if (!splineApp || !splineApp.scene) return;
            
            // Вращаем всю сцену Spline
            if (splineApp.scene.rotation) {
                splineApp.scene.rotation.y = angle;
            }
            
            // Альтернативный способ: найти все объекты и вращать их
            if (splineApp.getAllObjects) {
                const objects = splineApp.getAllObjects();
                objects.forEach(obj => {
                    if (obj.type === 'group' || obj.type === 'mesh') {
                        if (obj.name && obj.name.includes('rotate')) {
                            obj.rotation.y = angle;
                        }
                    }
                });
            }
        }
        
        // Создаем невидимую сферу-маркер для отслеживания вращения камеры (опционально)
        const markerGroup = new THREE.Group();
        scene.add(markerGroup);
        
        // --- ВСПОМОГАТЕЛЬНЫЙ РЕНДЕРИНГ ДЛЯ СИНХРОНИЗАЦИИ ---
        let lastRotation = 0;
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Автоматическое вращение сцены Spline
            if (autoRotate && splineApp && splineApp.scene) {
                currentRotation += rotationSpeed;
                rotateSplineScene(currentRotation);
            }
            
            // Обновляем OrbitControls
            controls.update();
            
            // Синхронизируем камеру Three.js с камерой Spline (если нужно)
            // syncSplineCamera(); // Раскомментировать, если нужно синхронизировать камеры
            
            // Рендерим сцену Three.js (пустую, только Orbit Controls)
            renderer.render(scene, camera);
        }
        
        animate();
        
        // --- НАСТРОЙКА UI ---
        const autoRotateToggle = document.getElementById('autoRotateToggle');
        const rotationSpeedSlider = document.getElementById('rotationSpeed');
        const resetCameraBtn = document.getElementById('resetCameraBtn');
        
        autoRotateToggle.addEventListener('change', (e) => {
            autoRotate = e.target.checked;
        });
        
        rotationSpeedSlider.addEventListener('input', (e) => {
            rotationSpeed = parseFloat(e.target.value);
        });
        
        resetCameraBtn.addEventListener('click', () => {
            camera.position.set(5, 5, 10);
            controls.target.set(0, 0, 0);
            controls.update();
            
            // Сбрасываем вращение сцены
            currentRotation = 0;
            rotateSplineScene(0);
        });
        
        // --- АДАПТАЦИЯ ПОД ИЗМЕНЕНИЕ РАЗМЕРА ОКНА ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            if (splineApp && splineApp.setSize) {
                splineApp.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        // Добавляем небольшой helper для отладки (опционально)
        // const axesHelper = new THREE.AxesHelper(5);
        // scene.add(axesHelper);
        
        console.log('🚀 Система готова, ожидаем загрузку модели Spline...');
        console.log('📌 Не забудьте заменить splineUrl на вашу реальную ссылку из Spline!');
    </script>
</body>
</html>
